<section class="contact" id="contact">
  <div class="container">
    <h2>Get in Touch</h2>
    <p class="section-sub">Building something with 3D scenes? Tell us about your project.</p>
    <div class="contact-form-wrap">
      <form action="https://formspree.io/f/mqewjdad" method="POST">
        <input type="hidden" name="_subject" value="RunSplat contact">
        <div class="form-group">
          <input type="text" name="name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <input type="email" name="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <textarea name="message" rows="5" placeholder="Tell us about your project" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Send Message</button>
      </form>
    </div>
  </div>
</section>
