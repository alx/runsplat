<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} — RunSplat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
    }
    header a { color: #888; text-decoration: none; font-size: 0.85rem; }
    header a:hover { color: #ccc; }
    header h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }
    .badge {
      display: inline-block;
      padding: 0.1em 0.5em;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-done { background: #0d2e1a; color: #4ade80; border: 1px solid #166534; }
    .badge-running { background: #1a1a00; color: #fbbf24; border: 1px solid #854d0e; }
    .badge-failed { background: #2e0d0d; color: #f87171; border: 1px solid #991b1b; }

    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left panel: input videos */
    .videos-panel {
      width: 340px;
      flex-shrink: 0;
      border-right: 1px solid #222;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .videos-panel h2 {
      margin: 0 0 0.5rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      font-weight: 500;
    }
    .video-item { display: flex; flex-direction: column; gap: 0.4rem; }
    .video-label { font-size: 0.8rem; color: #777; }
    video {
      width: 100%;
      border-radius: 6px;
      background: #111;
      display: block;
    }

    /* Right panel: 3DGS viewer */
    .viewer-panel { flex: 1; position: relative; }
    .viewer-panel iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .viewer-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .layout { flex-direction: column; }
      .videos-panel { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid #222; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/">← All projects</a>
    <h1>{{ .Title }}</h1>
    <span class="badge badge-{{ .Params.status | default "done" }}">{{ .Params.status | default "done" }}</span>
  </header>

  <div class="layout">
    <aside class="videos-panel">
      <h2>Input video{{ if gt (len .Params.videos) 1 }}s{{ end }}</h2>
      {{ range .Params.videos }}
      <div class="video-item">
        <span class="video-label">{{ . }}</span>
        <video controls preload="metadata">
          <source src="/projects/{{ $.File.ContentBaseName }}/input/{{ . }}" type="video/mp4">
        </video>
      </div>
      {{ end }}
    </aside>

    <div class="viewer-panel">
      {{ if eq (.Params.status | default "done") "done" }}
      <iframe
        src="/viewer/index.html?url=/projects/{{ .File.ContentBaseName }}/output.splat"
        allowfullscreen
        title="3D Gaussian Splat viewer for {{ .Title }}"
      ></iframe>
      {{ else }}
      <div class="viewer-placeholder">3DGS output not available yet</div>
      {{ end }}
    </div>
  </div>
</body>
</html>
