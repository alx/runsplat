name: Deploy frontmarket to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['docs/frontmarket/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: false

      - name: Build
        run: cd docs/frontmarket && hugo --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/frontmarket/public
          publish_branch: gh-pages
          commit_message: "deploy: frontmarket ${{ github.sha }}"
